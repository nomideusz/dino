name: Deploy dino-archive to CapRover

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'Dockerfile.archive'
      - 'deploy/dino-archive.captain-definition'
      - '.github/workflows/deploy-dino-archive.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check server
        run: |
          for f in server/server.mjs server/narrator.mjs server/sources/*.mjs; do
            node --check "$f"
          done

      - name: Prepare captain-definition
        run: cp deploy/dino-archive.captain-definition captain-definition

      - name: Create deployment tarball
        run: |
          tar -cf deploy.tar \
            --exclude=node_modules \
            captain-definition \
            Dockerfile.archive \
            server

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: https://captain.zaur.app
          app: dino-archive
          token: ${{ secrets.CAPROVER_DINO_ARCHIVE_TOKEN }}
